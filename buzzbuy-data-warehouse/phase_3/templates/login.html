<!DOCTYPE html>
<html>
  <head>
    <title>BuzzBuy Data Warehouse</title>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
  </head>

  <!-- <script src="{{ url_for('static', filename='js/template_loader.js') }}"></script> -->
  <body>
    <div class="w-75 p-3 m-auto">
      <h1>Login</h1>
      <form>
        <div class="mb-3">
          <label for="username" class="form-label">Employee ID</label>
          <input
            type="email"
            class="form-control"
            id="username"
            placeholder=""
          />
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input
            type="password"
            class="form-control"
            id="password"
            placeholder=""
          />
        </div>
        <button type="button" class="btn btn-warning" id="login">Log in</button>
      </form>

      <!-- Include JavaScript specific to the login page -->
      <script src="{{ url_for('static', filename='js/login.js') }}"></script>
    </div>
  </body>
  <footer class="bg-primary"></footer>
</html>
