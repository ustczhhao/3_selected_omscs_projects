{% extends "base.html" %} {% block content %}
<div class="mt-3 rounded-2 overflow-hidden border-warning p-2">
  <h1 class="mt-4">View and Manage Holidays</h1>
  <table class="table table-warning m-0">
    <thead>
      <tr>
        <th>Business Date</th>
        <th>Holiday Name</th>
        <th>Employee ID</th>
        <th>Date Added</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="holiday-table-body">
      <!-- Holiday rows insert by JavaScript -->
    </tbody>
  </table>
  <button id="add-holiday-button" class="mt-3 btn btn-primary">
    Add Holiday
  </button>
</div>

<div
  class="modal fade"
  id="addHolidayModal"
  tabindex="-1"
  aria-labelledby="addHolidayModalLabel"
  aria-hidden="true"
>
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="addHolidayModalLabel">Add Holiday</h5>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="modal"
          aria-label="Close"
        ></button>
      </div>
      <div class="modal-body">
        <form id="add-holiday-form">
          <div class="mb-3">
            <label for="business-date" class="form-label">Business Date</label>
            <input
              type="date"
              class="form-control"
              id="business-date"
              required
            />
          </div>
          <div class="mb-3">
            <label for="holiday-name" class="form-label">Holiday Name</label>
            <input
              type="text"
              class="form-control"
              id="holiday-name"
              required
            />
          </div>
          <button id="add-holiday-button" type="submit" class="btn btn-primary">
            Add Holiday
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

<script
  type="module"
  src="{{ url_for('static', filename='js/holiday.js') }}"
></script>
{% endblock %}
